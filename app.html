<!DOCTYPE html><html lang="uk"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баланс і платежі - Nova Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --np-red: #ED3237;
            --text-main: #111827;
            --text-secondary: #6B7280;
            --bg-body: #F9FAFB;
            --bg-sidebar: #F9FAFC;
            --bg-card: #FFFFFF;
            --border-color: #E5E7EB;
            
            --success-color: #059669;
            --success-bg: #D1FAE5;
            --warning-color: #D97706;
            --warning-bg: #FEF3C7;
            --danger-color: #DC2626;
            --brand-bg: #FFEAEA;
            --font-family: 'Inter', sans-serif;
        }




















































    <script>
        const APP_DATA = [
            {
                id: 'tab_1',
                label: 'Взаєморозрахунки з Нова Пошта',
                cards: [
                    { amount: '- 4 500 ₴', label: 'Заборгованість', c: 'c-danger', hint: 'Загальна сума неоплачених рахунків з простроченим терміном оплати' },
                    { amount: '34 680 ₴', label: 'Сплачено цього місяця', c: 'c-success', hint: 'Сума всіх оплат, здійснених з початку поточного місяця' },
                    { amount: '12 890 ₴', label: 'Очікується оплата', c: 'c-warning', tooltip: [
                        { sum: '3 960 ₴', date: 'до 10.07.2025' },
                        { sum: '3 960 ₴', date: 'до 10.09.2025' },
                        { sum: '4 970 ₴', date: 'до 15.10.2025' }
                    ]}
                ],
                cols: ['<input type="checkbox" class="custom-checkbox">', 'Дата', 'Номер рахунку', 'Кількість відправлень', 'Сума', 'Статус оплати', 'Спосіб оплати', 'Термін оплати', ''],
                rows: [
                    { d: ['<input type="checkbox" class="custom-checkbox">', '20.03.2025', '<span class="link-text">123456</span>', '957', '3 960 ₴', '<span class="badge bg-warning">Потребує оплати</span>', 'Безготівковий', '10.07.2025'], id: '123456' },
                    { d: ['<input type="checkbox" class="custom-checkbox">', '20.02.2025', '<span class="link-text">123457</span>', '1300', '8 450 ₴', '<span class="badge bg-success">Сплачено</span>', 'Безготівковий', '10.08.2025'], id: '123457' },
                    { d: ['<input type="checkbox" class="custom-checkbox">', '20.03.2025', '<span class="link-text">123458</span>', '957', '3 960 ₴', '<span class="badge bg-warning">Потребує оплати</span>', 'Безготівковий', '10.09.2025'], id: '123458' }
                ],
                menu: [
                    { l: 'Завантажити рахунок >', a: null },
                    { l: 'Завантажити акт звірки', a: null },
                    { l: 'Поділитися', a: null },
                    { l: 'Сплатити', a: 'openModal_Payment' }
                ]
            }
        ];

        let activeTabIdx = 0;

        function renderApp() {
            const td = APP_DATA[activeTabIdx];
            const cc = document.getElementById('cards-container');
            cc.innerHTML = td.cards.map(c => {
                let tooltipHtml = c.tooltip ? `<div class="card-tooltip">${c.tooltip.map(t => `<div class="card-tooltip-row"><span>${t.sum}</span><span>${t.date}</span></div>`).join('')}</div>` : '';
                let hintHtml = c.hint ? `<div class="card-hint"><svg class="card-hint-icon icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg><div class="card-hint-text">${c.hint}</div></div>` : '';
                return `<div class="balance-card"><div class="card-label">${c.label}${hintHtml}</div><div class="card-amount ${c.c}">${c.amount}</div>${tooltipHtml}</div>`;
            }).join('');

            const th = document.getElementById('table-head');
            th.innerHTML = `<tr>${td.cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

            const tb = document.getElementById('table-body');
            tb.innerHTML = td.rows.map(r => `<tr class="hover-row">${r.d.map(cell => `<td>${cell}</td>`).join('')}<td style="position:relative;"><button class="kebab-btn">...</button></td></tr>`).join('');
        }

        renderApp();
    </script>
</body>
</html>
